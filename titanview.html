<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN VIEW: SYSTEM TELEMETRY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.400.0"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { overflow: hidden; background: #050508; cursor: none; }
        .glass-container { padding: 30px; height: 100vh; border: none; background: transparent; }
        .motor-grid { 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 20px;
            margin-top: 40px;
        }
        .motor-card { height: 350px; pointer-events: none; }
        .motor-card h3 { font-size: 10px; color: #505050; }
        .fader { pointer-events: none; height: 250px; }
        
        .telemetry-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(0,255,71,0.05); 
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,255,71,0.3); 
            padding: 20px 50px; display: flex; align-items: center; justify-content: space-between;
            font-family: 'Orbitron'; color: #00ff47;
            z-index: 100;
        }
        .progress-container { flex: 1; margin: 0 60px; position: relative; }
        .progress-track { background: rgba(255,255,255,0.05); height: 6px; border-radius: 3px; overflow: hidden; }
        .progress-fill { background: #00ff47; height: 100%; width: 0%; box-shadow: 0 0 20px #00ff47; transition: width 0.1s linear; }
        
        .stat-box { display: flex; flex-direction: column; gap: 5px; min-width: 150px; }
        .stat-label { font-size: 10px; color: rgba(0,255,71,0.6); }
        .stat-value { font-size: 18px; font-weight: bold; }
        
        header { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        .logo h1 { font-size: 28px; }
    </style>
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo"><i data-lucide="zap"></i> <h1>TITAN<span>VIEW</span></h1></div>
            <div style="display: flex; gap: 30px; align-items: center;">
                <div id="connectionStatus" class="status-indicator">BRIDGE ONLINE</div>
                <div id="arduinoStatus" class="status-indicator">ARDUINO OFFLINE</div>
            </div>
        </header>
        
        <div id="motorGrid" class="motor-grid"></div>
        
        <div class="telemetry-bar">
            <div class="stat-box">
                <span class="stat-label">MODE</span>
                <span id="modeVal" class="stat-value">AUTONOMOUS</span>
            </div>
            
            <div class="progress-container">
                <div class="progress-track"><div id="loopFill" class="progress-fill"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-top: 8px; color: rgba(255,255,255,0.4);">
                    <span id="loopCurrent">00:00.0</span>
                    <span id="loopTotal">00:00.0</span>
                </div>
            </div>
            
            <div class="stat-box" style="text-align: right;">
                <span class="stat-label">LOOP DELAY</span>
                <span id="delayVal" class="stat-value">0.0s</span>
            </div>
        </div>
    </div>
    <script src="titanview.js"></script>
</body>
</html>
